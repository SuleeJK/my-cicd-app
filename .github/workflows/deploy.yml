name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  build-and-deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Necessitem permisos d'escriptura per actualitzar el values.yaml
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Generem un tag únic basat en el commit per evitar l'ús de "latest"
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            sulejk/my-cicd-app:latest
            sulejk/my-cicd-app:${{ github.sha }}
          # Injectem la API Key com a argument de build perquè Vite la pugui llegir
          build-args: |
            VITE_FOOTBALL_API_KEY=${{ secrets.VITE_FOOTBALL_API_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Build and Deploy to S3 (Production Cloud)
        env:
          VITE_FOOTBALL_API_KEY: ${{ secrets.VITE_FOOTBALL_API_KEY }}
        run: |
          npm ci
          npm run build
          aws s3 sync dist/ s3://${{ secrets.AWS_BUCKET_NAME }} --delete

      # PAS CLAU GITOPS: Actualitzem el tag del Helm Chart al repositori
      # Això farà que ArgoCD detecti el canvi i actualitzi el cluster local
      - name: Update Helm Chart Tag
        run: |
          sed -i 's/tag: .*/tag: "${{ github.sha }}"/' my-chart/values.yaml
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add my-chart/values.yaml
          git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push