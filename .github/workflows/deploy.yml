name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Afegim aquest bloc per garantir que el workflow té permisos d'escriptura
permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  build-and-deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Això permet que el push torni al mateix repo
          persist-credentials: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            sulejk/my-cicd-app:latest
            sulejk/my-cicd-app:${{ github.sha }}
          build-args: |
            VITE_FOOTBALL_API_KEY=${{ secrets.VITE_FOOTBALL_API_KEY }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Build and Deploy to S3
        env:
          VITE_FOOTBALL_API_KEY: ${{ secrets.VITE_FOOTBALL_API_KEY }}
        run: |
          npm ci
          npm run build
          aws s3 sync dist/ s3://${{ secrets.AWS_BUCKET_NAME }} --delete

      # PAS GITOPS: Actualització del tag al values.yaml
      - name: Update Helm Chart Tag
        run: |
          # Modifiquem el tag amb el SHA del commit actual
          sed -i 's/tag: .*/tag: "${{ github.sha }}"/' my-chart/values.yaml
          
          # Configurem Git per fer el commit
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add my-chart/values.yaml
          git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          
          # El push ara tindrà permís gràcies a la config del pas anterior
          git push