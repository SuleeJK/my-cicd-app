apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-vue
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-vue
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-vue
    spec:
      containers:
        - name: vue-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 80