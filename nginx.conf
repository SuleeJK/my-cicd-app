server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Aquesta línia és la clau: si la ruta no existeix com a fitxer,
        # redirigeix a index.html perquè Vue Router gestioni la navegació.
        try_files $uri $uri/ /index.html;
    }

    # Configuració opcional per a caching de recursos estàtics
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}